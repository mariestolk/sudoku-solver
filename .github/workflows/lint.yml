name: Lint & Format

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11.5"

      - run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/

      - name: Format
        run: uv run ruff format --check src/
